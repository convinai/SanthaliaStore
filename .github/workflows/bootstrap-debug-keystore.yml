name: Bootstrap signing keystore

# One-shot workflow. Run it ONCE via the Actions tab → "Bootstrap signing
# keystore" → "Run workflow". It will generate android-app/keystore/santhalia.keystore
# and commit it to main. After that, every Build APK run will use this
# keystore so APKs install on top of older versions without forcing the
# user to uninstall (which would erase their local data).

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bootstrap:
    name: Generate and commit keystore
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Check whether the keystore already exists
        id: check
        run: |
          if [ -f android-app/keystore/santhalia.keystore ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Keystore already present; nothing to do."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate keystore
        if: steps.check.outputs.exists == 'false'
        run: |
          mkdir -p android-app/keystore
          keytool -genkeypair -v \
            -keystore android-app/keystore/santhalia.keystore \
            -alias santhalia \
            -keyalg RSA -keysize 2048 -validity 36500 \
            -storepass santhalia \
            -keypass santhalia \
            -dname "CN=Santhalia Store, O=Santhalia, L=Bareilly, ST=UP, C=IN"
          ls -lh android-app/keystore/santhalia.keystore

      - name: Commit keystore
        if: steps.check.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add android-app/keystore/santhalia.keystore
          git commit -m "Bootstrap stable signing keystore for APK update continuity"
          git push
